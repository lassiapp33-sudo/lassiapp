# Supabase project configuration
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "lassiapp"

# Section 10 — Backups & résilience.
# Ces réglages sont gérés côté plateforme Supabase hébergée (Project
# Settings > Database > Backups), pas dans ce fichier (config.toml ne
# s'applique qu'au stack local du CLI) :
#   - Backups automatiques : activés par défaut sur tous les projets
#     hébergés (sauvegarde quotidienne, conservée 7 jours sur les plans
#     Free/Pro). Vérifier dans le dashboard que le projet de prod est bien
#     sur un plan avec backups activés.
#   - Point-in-time recovery (PITR) : add-on payant (plan Pro et plus),
#     permet de restaurer la base à n'importe quelle minute des derniers
#     jours en cas de désastre (suppression/corruption de données). À
#     activer avant la mise en production si le budget le permet.
[db]
major_version = 17

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
# Section 9 — HTTPS obligatoire : ce `enabled = false` est UNIQUEMENT pour
# le stack local du CLI Supabase (pas de certificat local). En production,
# le projet hébergé (https://*.supabase.co) n'expose aucun port HTTP : toute
# requête passe par HTTPS au niveau de la plateforme, ce réglage n'a aucun
# effet et ne peut pas être désactivé. L'app mobile et lassi-admin utilisent
# toutes deux des URLs https:// (voir .env / .env.example).
enabled = false

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
# Section 7 — authentification renforcée :
#   - mots de passe hachés en bcrypt par GoTrue (comportement par défaut,
#     non configurable, vérifié dans le code source Supabase Auth)
#   - longueur minimale 8 caractères (alignée avec la validation côté app)
minimum_password_length = 8
# JWT access token : expiration 1h max (Section 7)
jwt_expiry = 3600
# Refresh tokens sécurisés : rotation à chaque utilisation, avec une courte
# fenêtre de réutilisation pour absorber les retries réseau (Section 7)
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = true
enable_confirmations = false
template = "Your code is {{ .Code }} ."
max_frequency = "5s"

# process-payouts est appelée par pg_cron (pas de JWT utilisateur/anon
# disponible) : la passerelle Supabase ne doit pas exiger de JWT, la
# fonction vérifie elle-même l'en-tête X-Cron-Secret (voir CRON_SECRET).
[functions.process-payouts]
verify_jwt = false

# Section 9 — webhook-payment est appelée directement par les serveurs
# Wave/Orange Money (pas de JWT Supabase dans leurs callbacks) : la
# passerelle ne doit pas exiger de JWT, la fonction vérifie elle-même la
# signature HMAC (X-Wave-Signature / X-OM-Signature, voir
# WAVE_WEBHOOK_SECRET / OM_WEBHOOK_SECRET) avant tout traitement.
[functions.webhook-payment]
verify_jwt = false
